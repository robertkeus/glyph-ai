<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glyph — local chat (your API)</title>
<style>
body{margin:0;background:#0b0d12;color:#e6e9ef;font-family:system-ui;display:flex;flex-direction:column;height:100vh}
header{padding:.8rem 1rem;border-bottom:1px solid #232a37;font-weight:700}
header small{color:#8b94a7;font-weight:400}
#log{flex:1;overflow-y:auto;padding:1rem;max-width:780px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:.7rem}
.m{max-width:85%;padding:.6rem .85rem;border-radius:14px;font-size:.95rem;white-space:pre-wrap}
.u{align-self:flex-end;background:#1f6feb;color:#fff}
.a{align-self:flex-start;background:#141821;border:1px solid #232a37;width:85%}
.g{font-size:1.9rem;color:#ffd166;letter-spacing:.15em}
pre{background:#0d1017;padding:.5rem;border-radius:8px;overflow-x:auto;font-size:.82rem}
.dim{color:#8b94a7;font-size:.8rem}.ok{color:#4ade80;font-family:monospace}
.bar{display:flex;gap:.5rem;padding:.8rem;max-width:780px;width:100%;margin:0 auto}
input{flex:1;background:#0d1017;border:1px solid #232a37;color:#e6e9ef;border-radius:10px;padding:.65rem .85rem;font-size:1rem}
button{background:#7cdfff;color:#04222c;border:0;border-radius:10px;padding:0 1rem;font-weight:700;cursor:pointer}
</style></head><body>
<header>Glyph — local chat <small>· calls your live finetuned model's API (glyph-v2 Space)</small></header>
<div id="log"></div>
<div class="bar"><input id="q" placeholder="e.g. keep positives, square each, then return their sum" autofocus>
<button onclick="send()">Send</button></div>
<script>
const API = "https://robertkeus-glyph-v2.hf.space/gradio_api/call/glyph";
// Your HF token (any read token) → your PRO ZeroGPU quota. Stored ONLY in this browser.
let TOKEN = localStorage.getItem("hf_token") || "";
if(!TOKEN){ TOKEN = prompt("Paste your Hugging Face token (hf_...) — stays in your browser only:") || "";
            if(TOKEN) localStorage.setItem("hf_token", TOKEN); }
const HDRS = () => ({"Content-Type":"application/json", ...(TOKEN?{"Authorization":"Bearer "+TOKEN}:{})});
const log = document.getElementById("log"), q = document.getElementById("q");
const esc = s => String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function bubble(cls, html){const d=document.createElement("div");d.className="m "+cls;d.innerHTML=html;
 log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}

async function callGlyph(msg){
  // Gradio REST: POST returns {event_id}; GET streams the result as SSE
  const r = await fetch(API, {method:"POST", headers: HDRS(),
                              body: JSON.stringify({data:[msg]})});
  const {event_id} = await r.json();
  const txt = await (await fetch(`${API}/${event_id}`, {headers: HDRS()})).text();
  const line = txt.split("\n").find(l => l.startsWith("data:"));
  return JSON.parse(line.slice(5))[0];
}

async function send(){
  const msg = q.value.trim(); if(!msg) return;
  q.value = ""; bubble("u", esc(msg));
  const wait = bubble("a", "<span class='dim'>model thinking… (first call ~30s: GPU spin-up)</span>");
  try{
    const d = await callGlyph(msg);
    wait.innerHTML = d.error
      ? `<span class='dim'>⚠️ ${esc(d.error)}</span>`
      : `<div class="g">${esc(d.alien)}</div><div class="dim">${d.bytes} bytes · ${esc(d.english)}</div>
         <pre>${esc(d.code)}</pre><div class="ok">solve([3,-1,2,2,-5]) → ${esc(d.result)}</div>`;
  }catch(e){ wait.innerHTML = "<span class='dim'>⚠️ "+esc(e.message)+" — retry (Space may be waking)</span>"; }
}
q.addEventListener("keydown", e => { if(e.key === "Enter") send(); });
bubble("a","Hi — I'm your finetuned Glyph model, via the API. Ask a list/string/record task.");
</script></body></html>
