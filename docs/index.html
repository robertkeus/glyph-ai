<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glyph — chat</title>
<style>
:root{--bg:#0b0d12;--panel:#141821;--edge:#232a37;--ink:#e6e9ef;--dim:#8b94a7;
--accent:#7cdfff;--glyph:#ffd166;--pass:#4ade80;--user:#1f6feb;
--mono:ui-monospace,Menlo,Consolas,monospace;--sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);display:flex;flex-direction:column}
header{padding:.9rem 1rem;border-bottom:1px solid var(--edge)}
header b{font-size:1.05rem}header span{color:var(--dim);font-size:.85rem}
#log{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.8rem;max-width:820px;width:100%;margin:0 auto}
.msg{max-width:85%;padding:.6rem .85rem;border-radius:14px;font-size:.95rem}
.u{align-self:flex-end;background:var(--user);color:#fff;border-bottom-right-radius:4px}
.a{align-self:flex-start;background:var(--panel);border:1px solid var(--edge);border-bottom-left-radius:4px;width:85%}
.glyph{font-size:2rem;color:var(--glyph);letter-spacing:.15em;word-break:break-all;margin:.1rem 0 .5rem}
.lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin:.5rem 0 .2rem}
pre{margin:0;font-family:var(--mono);font-size:.82rem;white-space:pre-wrap;color:var(--ink)}
.run{font-family:var(--mono);color:var(--pass);margin-top:.4rem;font-size:.85rem}
.bytes{font-family:var(--mono);color:var(--accent);font-size:.85rem;margin-top:.5rem}
.err{color:#f87171}
.bar{border-top:1px solid var(--edge);padding:.7rem 1rem;max-width:820px;width:100%;margin:0 auto}
.chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.55rem}
.chip{background:#182030;border:1px solid var(--edge);color:var(--dim);border-radius:99px;padding:.2rem .65rem;font-size:.8rem;cursor:pointer}
.chip:hover{color:var(--ink);border-color:var(--accent)}
.inrow{display:flex;gap:.5rem}
input{flex:1;background:#0d1017;border:1px solid var(--edge);color:var(--ink);border-radius:10px;padding:.65rem .85rem;font-size:1rem;font-family:var(--sans)}
button{background:var(--accent);color:#04222c;border:0;border-radius:10px;padding:0 1.1rem;font-weight:700;cursor:pointer}
a{color:var(--accent)}
</style></head><body>
<header><b>Glyph</b> &nbsp;<span>ask about a list of numbers — the agents reply in their own glyph language, then working code</span></header>
<div id="log"></div>
<div class="bar">
  <div class="chips" id="chips"></div>
  <div class="inrow"><input id="q" placeholder="e.g. keep positives, square them, then sum" autofocus>
  <button id="send">Send</button></div>
</div>
<script>
const OPS=[
 {k:"evens",js:"r = r.filter(x => x % 2 === 0);",g:0x4e00,py:"r = [x for x in r if x % 2 == 0]",fn:r=>r.filter(x=>x%2===0),kw:["even"]},
 {k:"pos",js:"r = r.filter(x => x > 0);",g:0x4e01,py:"r = [x for x in r if x > 0]",fn:r=>r.filter(x=>x>0),kw:["positive"]},
 {k:"double",js:"r = r.map(x => x * 2);",g:0x4e03,py:"r = [x * 2 for x in r]",fn:r=>r.map(x=>x*2),kw:["double","twice"]},
 {k:"square",js:"r = r.map(x => x * x);",g:0x4e07,py:"r = [x * x for x in r]",fn:r=>r.map(x=>x*x),kw:["square"]},
 {k:"inc",js:"r = r.map(x => x + 1);",g:0x4e08,py:"r = [x + 1 for x in r]",fn:r=>r.map(x=>x+1),kw:["add one","increment","plus one"]},
 {k:"negate",js:"r = r.map(x => -x);",g:0x4e09,py:"r = [-x for x in r]",fn:r=>r.map(x=>-x),kw:["negate","flip sign","flip the sign","invert"]},
 {k:"absval",js:"r = r.map(x => Math.abs(x));",g:0x4e0a,py:"r = [abs(x) for x in r]",fn:r=>r.map(x=>Math.abs(x)),kw:["absolute","abs value"]},
 {k:"rev",js:"r = r.slice().reverse();",g:0x4e0b,py:"r = list(reversed(r))",fn:r=>[...r].reverse(),kw:["revers","backward","back to front"]},
 {k:"sorta",js:"r = r.slice().sort((a, b) => a - b);",g:0x4e0d,py:"r = sorted(r)",fn:r=>[...r].sort((a,b)=>a-b),kw:["ascending","smallest to","low to high","increasing"]},
 {k:"sortd",js:"r = r.slice().sort((a, b) => b - a);",g:0x4e0e,py:"r = sorted(r, reverse=True)",fn:r=>[...r].sort((a,b)=>b-a),kw:["descending","big to small","large to small","high to low","biggest to"]},
 {k:"uniq",js:"r = [...new Set(r)];",g:0x4e0f,py:"r = list(dict.fromkeys(r))",fn:r=>[...new Set(r)],kw:["dedup","duplicate","unique","distinct"]},
 {k:"dec",js:"r = r.map(x => x - 1);",g:0x4e10,py:"r = [x - 1 for x in r]",fn:r=>r.map(x=>x-1),kw:["subtract one","decrement","minus one"]},
 {k:"sum",js:"return r.reduce((a, b) => a + b, 0);",g:0x4e11,py:"return sum(r)",fn:r=>r.reduce((a,b)=>a+b,0),red:1,kw:["sum","add up","total","add everything","add them"]},
 {k:"max",js:"return r.length ? Math.max(...r) : 0;",g:0x4e13,py:"return max(r) if r else 0",fn:r=>r.length?Math.max(...r):0,red:1,kw:["max","biggest","largest","top one","the top","highest"]},
 {k:"len",js:"return r.length;",g:0x4e14,py:"return len(r)",fn:r=>r.length,red:1,kw:["how many","length","size"]},
 {k:"cnt",js:"return r.length;",g:0x4e15,py:"return sum(1 for _ in r)",fn:r=>r.length,red:1,kw:["count","number of"]},
];
const SAMPLE=[3,-1,2,2,-5];
const EX=["keep positives, square them, then sum","sort big to small and give the top one",
 "remove duplicates then add everything up","keep evens then double them","flip the sign then reverse"];
const alien=cp=>String.fromCodePoint(0x1400+(cp-0x4e00));
const esc=s=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const fmt=v=>Array.isArray(v)?"["+v.join(", ")+"]":String(v);
function parse(text){const t=text.toLowerCase(),hits=[];
 for(const op of OPS){for(const w of op.kw){const i=t.indexOf(w);if(i>=0){hits.push([i,op]);break;}}}
 hits.sort((a,b)=>a[0]-b[0]);const seen=new Set(),ops=[];
 for(const[,op]of hits)if(!seen.has(op.k)){seen.add(op.k);ops.push(op);}return ops;}
function toCode(ops){const L=["def solve(xs):","    r = list(xs)"];
 for(const op of ops){L.push("    "+op.py);if(op.red)return L.join("\n");}return L.concat(["    return r"]).join("\n");}
function toJs(ops){const L=["function solve(xs) {","  let r = [...xs];"];
 for(const op of ops){L.push("  "+op.js);if(op.red)return L.concat(["}"]).join("\n");}return L.concat(["  return r;","}"]).join("\n");}
function runJs(ops){let r=SAMPLE.slice();for(const op of ops){r=op.fn(r);if(op.red)return r;}return r;}
const log=document.getElementById("log");
function bubble(cls,html){const d=document.createElement("div");d.className="msg "+cls;d.innerHTML=html;
 log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}
function reply(text){
 const ops=parse(text);
 if(!ops.length){bubble("a","<span class='err'>I didn't spot any of my 16 operations — try wording like the suggestions.</span>");return;}
 const glyphs=ops.map(o=>alien(o.g)).join(""),gb=ops.length*2,eb=new Blob([text]).size,cut=Math.round((1-gb/eb)*100);
 bubble("a",`<div class="lbl">glyph message</div><div class="glyph">${glyphs}</div>
  <div class="lbl">working code — Python</div><pre>${esc(toCode(ops))}</pre>
  <div class="lbl">same message — JavaScript (symbols carry intent, not syntax)</div><pre>${esc(toJs(ops))}</pre>
  <div class="run">solve(${fmt(SAMPLE)}) &rarr; ${esc(fmt(runJs(ops)))}</div>
  <div class="bytes">${gb} bytes vs ${eb} — ${cut}% smaller</div>`);
}
function send(text){text=(text||"").trim();if(!text)return;bubble("u",esc(text));document.getElementById("q").value="";reply(text);}
document.getElementById("send").onclick=()=>send(document.getElementById("q").value);
document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")send(e.target.value);});
const chips=document.getElementById("chips");
EX.forEach(e=>{const b=document.createElement("span");b.className="chip";b.textContent=e;b.onclick=()=>send(e);chips.appendChild(b);});
bubble("a","Hi — I speak a compact glyph language for list operations. Ask me something, or tap a suggestion. I'll reply in glyphs, then real Python, and show how many fewer characters the glyphs use.");
</script></body></html>
